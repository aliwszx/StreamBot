<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>StreamBot Player</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --accent: #5a8dee;
      --text: #f0f0f0;
      --muted: #888;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    #header .logo { font-size: 20px; }
    #title {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #quality-badge {
      margin-left: auto;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
      display: none;
    }

    /* Player area */
    #player-area {
      position: relative;
      width: 100%;
      background: #000;
      aspect-ratio: 16/9;
      flex-shrink: 0;
    }

    /* Native video */
    #video {
      width: 100%; height: 100%;
      display: block; outline: none;
    }

    /* Loading overlay */
    #loading {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 10;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { font-size: 13px; color: var(--muted); }

    /* Error overlay */
    #error {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 10;
      padding: 20px;
      text-align: center;
    }
    #error-icon { font-size: 36px; }
    #error-msg { font-size: 14px; color: #ccc; }
    #retry-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 14px;
      cursor: pointer;
    }

    /* Controls */
    #controls {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface);
      flex-shrink: 0;
    }
    .ctrl-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      width: 32px;
      text-align: center;
    }
    #progress {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }
    #time { font-size: 12px; color: var(--muted); white-space: nowrap; min-width: 80px; }
    #vol-slider { width: 70px; accent-color: var(--accent); }

    /* Dual stream info badge */
    #dual-badge {
      display: none;
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(90,141,238,0.85);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      z-index: 5;
      letter-spacing: 0.5px;
    }

    /* Streams section */
    #streams-section {
      padding: 14px 16px;
      flex-shrink: 0;
    }
    #streams-section h3 {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }
    #stream-list { display: flex; flex-direction: column; gap: 8px; }
    .stream-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .stream-item.active { border-color: var(--accent); }
    .stream-item:hover { border-color: #444; }
    .stream-icon { font-size: 18px; }
    .stream-info { flex: 1; min-width: 0; }
    .stream-quality { font-size: 14px; font-weight: 600; }
    .stream-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .stream-check { color: var(--accent); font-size: 16px; display: none; }
    .stream-item.active .stream-check { display: block; }

    /* No params */
    #no-params {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
    }
    #no-params-icon { font-size: 48px; }
  </style>
</head>
<body>
  <div id="header">
    <span class="logo">🎬</span>
    <span id="title">StreamBot</span>
    <span id="quality-badge"></span>
  </div>

  <div id="player-area">
    <video id="video" controls playsinline></video>
    <span id="dual-badge">🎵 DUAL</span>

    <div id="loading">
      <div class="spinner"></div>
      <div id="loading-text">Yüklənir...</div>
    </div>

    <div id="error">
      <div id="error-icon">⚠️</div>
      <div id="error-msg">Stream yüklənmədi.</div>
      <button id="retry-btn">🔄 Yenidən cəhd et</button>
    </div>
  </div>

  <div id="controls">
    <button class="ctrl-btn" id="play-btn">▶</button>
    <input type="range" id="progress" min="0" max="100" value="0" />
    <span id="time">00:00 / 00:00</span>
    <button class="ctrl-btn" id="mute-btn">🔊</button>
    <input type="range" id="vol-slider" min="0" max="100" value="100" />
    <button class="ctrl-btn" id="fs-btn">⛶</button>
  </div>

  <div id="streams-section" style="display:none">
    <h3>Keyfiyyət seçin</h3>
    <div id="stream-list"></div>
  </div>

  <div id="no-params">
    <div id="no-params-icon">📭</div>
    <div>Stream tapılmadı</div>
  </div>

<script>
  // ── Server base URL (main.py tərəfindən doldurulur) ───────────
  // Mini App-də nisbi URL-lər telegram.org-a gedir, ona görə mütləq URL lazımdır.
  const BASE_URL = '';

  // ── URL params ────────────────────────────────────────────────
  const params     = new URLSearchParams(location.search);
  const title      = decodeURIComponent(params.get('title') || 'Video');
  const pageUrl    = params.get('page') || '';   // live-resolve üçün
  const rawStreams = params.get('streams') || ''; // pre-encoded streams

  // streams formatı: JSON array
  // [{url: "...", quality: "..."}, ...]
  // url ya birbaşa m3u8 ya da JSON {"v":"...","a":"...","q":"..."}
  let streams = [];
  try {
    if (rawStreams) streams = JSON.parse(decodeURIComponent(rawStreams));
  } catch(_) {}

  const titleEl    = document.getElementById('title');
  const qualityBadge = document.getElementById('quality-badge');
  const loadingEl  = document.getElementById('loading');
  const loadingTxt = document.getElementById('loading-text');
  const errorEl    = document.getElementById('error');
  const errorMsg   = document.getElementById('error-msg');
  const retryBtn   = document.getElementById('retry-btn');
  const controlsEl = document.getElementById('controls');
  const streamsSec = document.getElementById('streams-section');
  const streamList = document.getElementById('stream-list');
  const noParams   = document.getElementById('no-params');
  const video      = document.getElementById('video');
  const playBtn    = document.getElementById('play-btn');
  const progress   = document.getElementById('progress');
  const timeEl     = document.getElementById('time');
  const muteBtn    = document.getElementById('mute-btn');
  const volSlider  = document.getElementById('vol-slider');
  const fsBtn      = document.getElementById('fs-btn');
  const dualBadge  = document.getElementById('dual-badge');

  let hls = null;
  let audioHls = null;
  let currentIndex = 0;
  let triedIndexes = new Set(); // sonsuz fallback dövrünün qarşısını almaq üçün

  // ── Ardıcıl fallback — sonsuz dövr yaratmadan növbəti stream-ə keçir ──
  function tryNextStream(failedIndex) {
    triedIndexes.add(failedIndex);
    let nextIdx = -1;
    for (let i = 0; i < streams.length; i++) {
      if (!triedIndexes.has(i)) { nextIdx = i; break; }
    }
    if (nextIdx === -1) {
      showError('Heç bir stream yüklənmədi. Başqa keyfiyyət seçməyə cəhd edin.');
      return;
    }
    triedIndexes.add(nextIdx);
    currentIndex = nextIdx;

    document.querySelectorAll('.stream-item').forEach((el, i) =>
      el.classList.toggle('active', i === nextIdx));
    if (streams[nextIdx]) {
      qualityBadge.textContent = streams[nextIdx].quality;
    }

    showLoading('Alternativ stream cəhd edilir...');
    destroyHls();

    const next = streams[nextIdx];
    if (next.audioUrl) {
      loadDualStream(toProxyUrl(next.url), toProxyUrl(next.audioUrl), next.quality);
    } else {
      loadNative(toProxyUrl(next.url));
    }
  }

  // ── HLS Proxy — CORS problemini həll edir ────────────────────
  // p.2turk.xyz CORS header göndərmir. Buna görə bütün HLS URL-ləri
  // öz serverimizin /hls-proxy endpoint-i üzərindən keçiririk.
  function toProxyUrl(url) {
    if (!url || !BASE_URL) return url;
    // Artıq proxy URL-dirsə dəyişmə
    if (url.includes('/hls-proxy?')) return url;
    return BASE_URL + '/hls-proxy?url=' + encodeURIComponent(url);
  }

  // ── Init ──────────────────────────────────────────────────────
  async function init() {
    titleEl.textContent = title;

    // Əgər live-resolve lazımdırsa (pageUrl verilmişsə)
    if (pageUrl && !streams.length) {
      const liveSources = await fetchLiveSources(pageUrl);
      if (liveSources && liveSources.length) {
        streams = liveSources.map(s => ({
          url: s.video,
          audioUrl: s.audio || null,
          quality: s.quality || 'HD',
        }));
      }
    }

    if (!streams.length) {
      document.getElementById('player-area').style.display = 'none';
      controlsEl.style.display = 'none';
      streamsSec.style.display = 'none';
      noParams.style.display = 'flex';
      loadingEl.style.display = 'none';
      return;
    }

    renderStreamList();
    loadStream(0);
  }

  // ── Live resolve — client-side scraping ──────────────────────
  // Server (Render) IP-si bloklanır. Buna görə scraping-i
  // birbaşa istifadəçinin brauzerindən edirik — real IP ilə.
  async function fetchLiveSources(pageUrl) {
    try {
      showLoading('Səhifə yüklənir...');

      // 1. Əsas səhifəni CORS proxy vasitəsilə çək
      const html = await fetchViaProxy(pageUrl);
      if (!html) return null;

      showLoading('Stream axtarılır...');

      // 2. HTML-dən birbaşa m3u8 axtar
      let sources = findM3u8InHtml(html);
      if (sources.length) return sources;

      // 3. iframe/embed URL-lərini tap
      const embedUrls = findEmbedUrls(html, pageUrl);

      // 4. Hər embed URL-ini resolve et
      for (const embedUrl of embedUrls.slice(0, 5)) {
        const embedHtml = await fetchViaProxy(embedUrl);
        if (!embedHtml) continue;

        sources = findM3u8InHtml(embedHtml);
        if (sources.length) return sources;

        sources = parsePlayerConfig(embedHtml);
        if (sources.length) return sources;

        // Bir səviyyə daha dərin
        const nested = findEmbedUrls(embedHtml, embedUrl);
        for (const nestedUrl of nested.slice(0, 3)) {
          if (nestedUrl === embedUrl) continue;
          const nestedHtml = await fetchViaProxy(nestedUrl);
          if (!nestedHtml) continue;
          sources = findM3u8InHtml(nestedHtml);
          if (sources.length) return sources;
          sources = parsePlayerConfig(nestedHtml);
          if (sources.length) return sources;
        }
      }

      return null;
    } catch(e) {
      console.error('fetchLiveSources xətası:', e);
      return null;
    }
  }

  // CORS proxy siyahısı — birincisi uğursuz olarsa növbətisinə keçir
  const CORS_PROXIES = [
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  ];

  async function fetchViaProxy(url) {
    for (const proxyFn of CORS_PROXIES) {
      try {
        const proxyUrl = proxyFn(url);
        const resp = await fetch(proxyUrl, {
          headers: {
            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/124.0.0.0 Safari/537.36',
          },
          signal: AbortSignal.timeout(12000),
        });
        if (resp.ok) {
          const text = await resp.text();
          if (text && text.length > 100) return text;
        }
      } catch(e) {
        console.warn('Proxy uğursuz:', e.message);
      }
    }
    return null;
  }

  function findM3u8InHtml(html) {
    const patterns = [
      /(?:file|src|source|url)\s*[:=]\s*['"](https?:\/\/[^'"]+\.m3u8[^'"]*)['"]/gi,
      /['"](https?:\/\/[^'"]+\.m3u8[^'"]*)['"]/gi,
    ];
    const found = new Set();
    for (const pat of patterns) {
      let m;
      pat.lastIndex = 0;
      while ((m = pat.exec(html)) !== null) {
        found.add(m[1].trim());
      }
    }
    return pairVideoAudio([...found]);
  }

  function findEmbedUrls(html, baseUrl) {
    const urls = [];
    const seen = new Set();

    // iframe src
    const iframePat = /<iframe[^>]+(?:src|data-src)\s*=\s*['"]([^'"]+)['"]/gi;
    let m;
    while ((m = iframePat.exec(html)) !== null) {
      let src = m[1];
      if (src.startsWith('//')) src = 'https:' + src;
      if (src.startsWith('http') && !seen.has(src)) {
        seen.add(src); urls.push(src);
      }
    }

    // Script-lərdə embed URL-lər
    const knownHosts = ['vidmoly','filemoon','doodstream','mixdrop','streamtape',
                        'voe.sx','upstream','vudeo','player','embed','p2turk',
                        'mcloud','rabbitstream','mycloud'];
    const scriptPat = /['"](https?:\/\/[^'"]{10,})['"]/gi;
    while ((m = scriptPat.exec(html)) !== null) {
      const u = m[1];
      if (knownHosts.some(h => u.includes(h)) && !seen.has(u)) {
        seen.add(u); urls.push(u);
      }
    }

    return urls;
  }

  function parsePlayerConfig(html) {
    // JWPlayer
    const jwMatch = html.match(/jwplayer\([^)]+\)\.setup\((\{[\s\S]*?\})\)/);
    if (jwMatch) {
      try {
        const cfg = JSON.parse(jwMatch[1]);
        const urls = (cfg.sources || [])
          .filter(s => s.file && s.file.includes('.m3u8'))
          .map(s => s.file);
        if (urls.length) return pairVideoAudio(urls);
      } catch(e) {}
    }

    // Generic file/url/src
    const filePat = /(?:file|url|src)\s*:\s*['"](https?:\/\/[^'"]+\.m3u8[^'"]*)['"]/gi;
    const found = new Set();
    let m;
    while ((m = filePat.exec(html)) !== null) found.add(m[1].trim());
    return found.size ? pairVideoAudio([...found]) : [];
  }

  function pairVideoAudio(urls) {
    if (!urls.length) return [];
    const audioRe = /[-_\/](audio|sound|aac|ac3)[-_\/.]|f\d+-a\d+\.m3u8|\/a\.m3u8/i;
    const audioUrls = urls.filter(u => audioRe.test(u));
    const videoUrls = urls.filter(u => !audioRe.test(u));
    const targets = videoUrls.length ? videoUrls : urls;
    return targets.map(v => {
      const base = v.rsplit ? v.rsplit('/', 1)[0] : v.substring(0, v.lastIndexOf('/'));
      const audio = audioUrls.find(a => a.startsWith(base)) || (audioUrls.length === 1 ? audioUrls[0] : null);
      return { video: v, audio: audio || undefined, quality: detectQuality(v) };
    });
  }

  function detectQuality(url) {
    const m = url.match(/(\d{3,4})[pP]/);
    if (m) return m[1] + 'p';
    if (/4k|2160/i.test(url)) return '4K';
    if (url.includes('1080')) return '1080p';
    if (url.includes('720')) return '720p';
    if (url.includes('480')) return '480p';
    return 'HD';
  }

  // ── Stream list render ────────────────────────────────────────
  function renderStreamList() {
    streamList.innerHTML = '';
    if (streams.length <= 1) { streamsSec.style.display = 'none'; return; }
    streamsSec.style.display = 'block';

    streams.forEach((s, i) => {
      const div = document.createElement('div');
      div.className = 'stream-item' + (i === 0 ? ' active' : '');
      const isDual = !!(s.audioUrl);
      div.innerHTML = `
        <span class="stream-icon">${qualityIcon(s.quality)}</span>
        <div class="stream-info">
          <div class="stream-quality">${s.quality}${isDual ? ' 🎵' : ''}</div>
          <div class="stream-meta">${isDual ? 'Video + Audio ayrı m3u8' : 'Unified stream'}</div>
        </div>
        <span class="stream-check">✓</span>`;
      div.addEventListener('click', () => loadStream(i));
      streamList.appendChild(div);
    });
  }

  function qualityIcon(q) {
    const l = (q || '').toLowerCase();
    if (l.includes('4k') || l.includes('2160')) return '🌟';
    if (l.includes('1080')) return '🔵';
    if (l.includes('720'))  return '🟢';
    if (l.includes('480'))  return '🟡';
    if (l.includes('360'))  return '🟠';
    return '📺';
  }

  // ── Load stream ───────────────────────────────────────────────
  function loadStream(index) {
    currentIndex = index;
    triedIndexes = new Set([index]); // yeni manual seçim — fallback tarixçəsini sıfırla
    const s = streams[index];
    if (!s) return;

    qualityBadge.textContent = s.quality;
    qualityBadge.style.display = 'inline-block';

    document.querySelectorAll('.stream-item').forEach((el, i) =>
      el.classList.toggle('active', i === index));

    showLoading('Stream yüklənir...');
    hideError();

    destroyHls();

    if (s.audioUrl) {
      // ── Dual stream: video m3u8 + ayrı audio m3u8
      loadDualStream(toProxyUrl(s.url), toProxyUrl(s.audioUrl), s.quality);
    } else {
      // ── Tək unified m3u8
      loadNative(toProxyUrl(s.url));
    }
  }

  // ── Dual stream (video + audio ayrı m3u8) ────────────────────
  function loadDualStream(videoUrl, audioUrl, quality) {
    video.style.display = 'block';
    controlsEl.style.display = 'flex';
    dualBadge.style.display = 'block';

    if (!Hls.isSupported()) {
      showError('Bu brauzerdə dual stream dəstəklənmir. Native HLS cəhd edilir...');
      loadNative(toProxyUrl(videoUrl));
      return;
    }

    // Video HLS
    hls = new Hls({ enableWorker: true, lowLatencyMode: true });
    hls.loadSource(videoUrl);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      // Audio HLS — ayrı audio track kimi yükləyirik
      // Hls.js audio track-ləri video media-ya bağlayırıq
      loadAudioTrack(audioUrl);
    });
    hls.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) {
        console.warn('Dual stream video xəta, növbəti stream-ə keçir:', data.details);
        destroyHls();
        tryNextStream(currentIndex);
      }
    });
  }

  function loadAudioTrack(audioUrl) {
    // Audio üçün ayrı hidden <audio> elementi istifadə edirik
    // video ilə sinxron edirik
    let audioEl = document.getElementById('audio-sync');
    if (!audioEl) {
      audioEl = document.createElement('audio');
      audioEl.id = 'audio-sync';
      audioEl.style.display = 'none';
      document.body.appendChild(audioEl);
    }

    if (Hls.isSupported()) {
      audioHls = new Hls({ enableWorker: true });
      audioHls.loadSource(audioUrl);
      audioHls.attachMedia(audioEl);
      audioHls.on(Hls.Events.MANIFEST_PARSED, () => {
        audioEl.volume = video.volume;
        audioEl.muted = video.muted;
        hideLoading();
        video.play().then(() => {
          audioEl.play().catch(() => {});
          syncAudio(audioEl);
        }).catch(() => {});
        updatePlayBtn();
      });
      audioHls.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) {
          // Audio xətası — yalnız video ilə davam et
          console.warn('Audio track xətası, yalnız video oxunur');
          hideLoading();
          video.play().catch(() => {});
        }
      });
    } else {
      audioEl.src = audioUrl;
      audioEl.load();
      hideLoading();
      video.play().then(() => {
        audioEl.play().catch(() => {});
        syncAudio(audioEl);
      }).catch(() => {});
    }
  }

  function syncAudio(audioEl) {
    // Video ilə audio-nu sinxron tut
    video.addEventListener('play', () => { audioEl.play().catch(() => {}); });
    video.addEventListener('pause', () => { audioEl.pause(); });
    video.addEventListener('seeked', () => { audioEl.currentTime = video.currentTime; });
    video.addEventListener('volumechange', () => {
      audioEl.volume = video.volume;
      audioEl.muted = video.muted;
    });
    video.addEventListener('ended', () => { audioEl.pause(); });
  }

  // ── Native/unified HLS ────────────────────────────────────────
  function loadNative(url, fallbackIndex) {
    video.style.display = 'block';
    controlsEl.style.display = 'flex';
    dualBadge.style.display = 'none';

    // Köhnə audio sinc elementi sil
    const oldAudio = document.getElementById('audio-sync');
    if (oldAudio) { oldAudio.src = ''; oldAudio.remove(); }

    const isHls = url.includes('.m3u8') || url.includes('m3u8');
    const failIdx = fallbackIndex !== undefined ? fallbackIndex : currentIndex;

    // Xəta olduqda növbəti stream-ə keçmək — sonsuz dövrün qarşısını
    // almaq üçün tryNextStream() istifadə edirik (artıq sınanmış index-lər
    // triedIndexes-də saxlanılır, ona görə eyni stream ikinci dəfə yoxlanmır,
    // və sınanmamış stream qalmayanda tryNextStream avtomatik showError çağırır)
    function onFatalError(msg) {
      tryNextStream(failIdx);
    }

    if (isHls && Hls.isSupported()) {
      hls = new Hls({
        enableWorker: true,
        lowLatencyMode: true,
        xhrSetup: function(xhr, url) {
          xhr.withCredentials = false;
        },
      });
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        hideLoading();
        video.play().catch(() => {});
        updatePlayBtn();
      });
      hls.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) {
          console.warn('HLS fatal xəta:', data.type, data.details, url);
          onFatalError('HLS stream yüklənmədi.');
        }
      });
    } else if (isHls && video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.addEventListener('loadedmetadata', () => { hideLoading(); video.play().catch(() => {}); }, { once: true });
      video.addEventListener('error', () => onFatalError('Video yüklənmədi.'), { once: true });
    } else {
      video.src = url;
      video.addEventListener('canplay', hideLoading, { once: true });
      video.addEventListener('error', () => onFatalError('Video yüklənmədi.'), { once: true });
      video.play().catch(() => {});
    }
  }

  // ── HLS cleanup ───────────────────────────────────────────────
  function destroyHls() {
    if (hls) { hls.destroy(); hls = null; }
    if (audioHls) { audioHls.destroy(); audioHls = null; }
    const oldAudio = document.getElementById('audio-sync');
    if (oldAudio) { oldAudio.pause(); oldAudio.src = ''; }
    video.pause();
    video.src = '';
  }

  // ── UI helpers ────────────────────────────────────────────────
  function showLoading(msg) {
    loadingTxt.textContent = msg || 'Yüklənir...';
    loadingEl.style.display = 'flex';
  }
  function hideLoading() { loadingEl.style.display = 'none'; }
  function showError(msg) {
    hideLoading();
    errorMsg.textContent = msg;
    errorEl.style.display = 'flex';
  }
  function hideError() { errorEl.style.display = 'none'; }

  retryBtn.addEventListener('click', () => loadStream(currentIndex));

  // ── Native video controls ─────────────────────────────────────
  function updatePlayBtn() { playBtn.textContent = video.paused ? '▶' : '⏸'; }
  playBtn.addEventListener('click', () => {
    const audioEl = document.getElementById('audio-sync');
    if (video.paused) {
      video.play().catch(() => {});
      if (audioEl) audioEl.play().catch(() => {});
    } else {
      video.pause();
      if (audioEl) audioEl.pause();
    }
    updatePlayBtn();
  });
  video.addEventListener('play', updatePlayBtn);
  video.addEventListener('pause', updatePlayBtn);

  video.addEventListener('timeupdate', () => {
    if (!video.duration) return;
    progress.value = (video.currentTime / video.duration) * 100;
    timeEl.textContent = fmt(video.currentTime) + ' / ' + fmt(video.duration);
  });
  progress.addEventListener('input', () => {
    if (video.duration) {
      const t = (progress.value / 100) * video.duration;
      video.currentTime = t;
      const audioEl = document.getElementById('audio-sync');
      if (audioEl) audioEl.currentTime = t;
    }
  });
  video.addEventListener('loadedmetadata', () => {
    const live = !isFinite(video.duration);
    progress.style.display = live ? 'none' : '';
    timeEl.textContent = live ? '🔴 CANLI' : '';
  });

  function fmt(s) {
    if (!isFinite(s)) return '--:--';
    return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(Math.floor(s%60)).padStart(2,'0');
  }

  muteBtn.addEventListener('click', () => {
    const audioEl = document.getElementById('audio-sync');
    video.muted = !video.muted;
    if (audioEl) audioEl.muted = video.muted;
    muteBtn.textContent = video.muted ? '🔇' : '🔊';
  });
  volSlider.addEventListener('input', () => {
    const audioEl = document.getElementById('audio-sync');
    video.volume = volSlider.value / 100;
    video.muted = video.volume === 0;
    if (audioEl) { audioEl.volume = video.volume; audioEl.muted = video.muted; }
    muteBtn.textContent = video.muted ? '🔇' : '🔊';
  });

  fsBtn.addEventListener('click', () => {
    const el = document.getElementById('player-area');
    if (!document.fullscreenElement)
      (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
    else
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  });

  init();
</script>
</body>
</html>
