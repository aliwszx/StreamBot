services:
  - type: web
    name: streambot
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Playwright Chromium üçün ən azı "starter" plan lazımdır (512MB RAM)
    # Free plan yetərsizdir — Chromium 200-300MB RAM istifadə edir
    plan: starter
    region: frankfurt
    healthCheckPath: /

    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: WEBHOOK_URL
        fromService:
          type: web
          name: streambot
          property: host
      - key: WEBHOOK_PATH
        value: /webhook
      - key: PORT
        value: "8000"
      - key: LOG_LEVEL
        value: INFO
      - key: CACHE_TTL
        value: "300"
      - key: ITEMS_PER_PAGE
        value: "5"
      # Playwright headless Chromium üçün
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /home/botuser/.cache/ms-playwright
